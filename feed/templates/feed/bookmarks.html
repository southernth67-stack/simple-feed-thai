{% extends 'feed/base.html' %}
{% load feed_extras %}
{% block title %} - โพสต์ที่บันทึกไว้{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card mb-4 text-center">
            <div class="card-body">
                <h4 class="mb-0"><i class="bi bi-bookmark-fill"></i> โพสต์ที่บันทึกไว้</h4>
            </div>
        </div>
        <div id="posts-container">
            {% include 'feed/_post.html' %}
        </div>
        {% if not posts %}
            <div class="card">
                <div class="card-body text-center py-5">
                    <i class="bi bi-bookmark fs-1 text-muted"></i>
                    <p class="text-muted mt-2">ยังไม่มีโพสต์ที่บันทึกไว้</p>
                    <a href="{% url 'feed' %}" class="btn btn-primary mt-2">
                        <i class="bi bi-house"></i> กลับไปฟีด
                    </a>
                </div>
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
