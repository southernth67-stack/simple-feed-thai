{% extends 'feed/base.html' %}
{% block title %} - แก้ไขโพสต์{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <a href="{% url 'feed' %}" class="btn btn-outline-primary mb-3">
            <i class="bi bi-arrow-left"></i> กลับไปฟีด
        </a>
        <div class="card">
            <div class="card-body">
                <h5><i class="bi bi-pencil-square"></i> แก้ไขโพสต์</h5>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.text }}
                    <div class="mt-2">
                        {{ form.image }}
                    </div>
                    {% if post.image %}
                        <div class="mt-2">
                            <img src="{{ post.image.url }}" class="post-image" alt="รูปปัจจุบัน">
                            <p class="text-muted small mt-1"><i class="bi bi-info-circle"></i> รูปภาพปัจจุบัน — อัปโหลดใหม่เพื่อเปลี่ยน</p>
                        </div>
                    {% endif %}
                    <button type="submit" class="btn btn-primary mt-3">
                        <i class="bi bi-check-lg"></i> บันทึก
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
