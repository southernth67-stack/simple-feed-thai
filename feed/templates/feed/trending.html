{% extends 'feed/base.html' %}
{% block title %} - แฮชแท็กกำลังมาแรง{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card mb-4 text-center">
            <div class="card-body">
                <h4 class="mb-0"><i class="bi bi-fire"></i> แฮชแท็กกำลังมาแรง</h4>
            </div>
        </div>
        {% for tag in tags %}
            <div class="card post-card">
                <div class="card-body d-flex align-items-center justify-content-between">
                    <div>
                        <a href="{% url 'hashtag_posts' tag.name %}" class="hashtag-link fs-5">
                            #{{ tag.name }}
                        </a>
                    </div>
                    <span class="badge rounded-pill" style="background:linear-gradient(135deg,var(--btn-primary-start),var(--btn-primary-end));">
                        {{ tag.post_count }} โพสต์
                    </span>
                </div>
            </div>
        {% empty %}
            <div class="card">
                <div class="card-body text-center py-5">
                    <i class="bi bi-hash fs-1 text-muted"></i>
                    <p class="text-muted mt-2">ยังไม่มีแฮชแท็ก</p>
                </div>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
