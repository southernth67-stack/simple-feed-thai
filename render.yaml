services:
  - type: web
    name: simple-feed-thai
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn simple_feed.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
    staticServeDirectories:
      - path: ./staticfiles
        url: /static/
      - path: ./media
        url: /media/